<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lineage Runner</title>
  <link rel="stylesheet" href="/styles.css?v=20260527-map-library1">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Lineage Runner</h1>
      <p>Launch and monitor CLI simulations without living in terminal scrollback.</p>
    </div>
    <div class="status-pill" id="refreshStatus">Idle</div>
  </header>

  <main>
    <section class="launch-panel">
      <h2>Launch Run</h2>
      <form id="launchForm" class="launch-form">
        <label>
          Scenario
          <select id="scenarioPath" required></select>
        </label>
        <label>
          Ticks
          <input id="ticks" type="number" min="1" step="1" value="20000" required>
        </label>
        <label>
          Seed
          <input id="seed" type="number" min="0" step="1" placeholder="scenario default">
        </label>
        <label>
          Checkpoint interval
          <input id="checkpointInterval" type="number" min="0" step="1" placeholder="manual only">
        </label>
        <label class="checkbox-row">
          <input id="stopOnExtinction" type="checkbox" checked>
          <span>Stop on extinction</span>
        </label>
        <button type="submit">Start CLI Run</button>
      </form>
      <div class="scenario-options-header">
        <button id="scenarioOptionsToggle" class="secondary" type="button">Scenario Options</button>
        <span id="scenarioOptionsStatus" class="scenario-options-status"></span>
      </div>
      <div id="biomePreview" class="biome-preview">
        <div class="biome-preview-header">
          <div>
            <h3>Biome Preview</h3>
            <div id="biomePreviewMeta" class="biome-preview-meta"></div>
          </div>
          <div class="biome-preview-actions">
            <label class="biome-brush-label">
              Layer
              <select id="paintLayerSelect" disabled>
                <option value="biome">Biomes</option>
                <option value="obstacle">Walls</option>
              </select>
            </label>
            <label class="biome-brush-label">
              Brush
              <select id="biomeBrushSelect" disabled></select>
            </label>
            <label class="biome-brush-label">
              Wall
              <select id="obstacleBrushSelect" disabled>
                <option value="add">Add</option>
                <option value="erase">Erase</option>
              </select>
            </label>
            <label class="biome-brush-label">
              Reusable Map
              <select id="mapArtifactSelect" disabled>
                <option value="">No saved maps</option>
              </select>
            </label>
            <button id="applyMapArtifactButton" class="secondary" type="button" disabled>Apply Map</button>
            <button id="saveMapArtifactButton" class="secondary" type="button" disabled>Save Reusable Map</button>
            <button id="renameMapArtifactButton" class="secondary" type="button" disabled>Rename Map</button>
            <button id="duplicateMapArtifactButton" class="secondary" type="button" disabled>Duplicate Map</button>
            <button id="deleteMapArtifactButton" class="danger" type="button" disabled>Delete Map</button>
            <button id="paintBiomeMapButton" class="secondary" type="button" disabled>Paint Map</button>
            <button id="toggleBiomePreviewButton" class="secondary" type="button" aria-expanded="true" aria-controls="biomePreviewContent">Hide Map</button>
            <button id="refreshBiomePreviewButton" class="secondary" type="button">Refresh Map</button>
          </div>
        </div>
        <div id="mapArtifactDetails" class="map-artifact-details" hidden></div>
        <div id="biomePreviewContent" class="biome-preview-content">
          <div class="biome-preview-body">
            <canvas id="biomePreviewCanvas" aria-label="Biome map preview"></canvas>
            <div id="biomePreviewLegend" class="biome-preview-legend"></div>
          </div>
          <div id="biomePreviewStatus" class="biome-preview-status">Choose a scenario to preview its biome layout.</div>
        </div>
      </div>
      <div id="scenarioOptionsPanel" class="scenario-options-panel" hidden>
        <div class="recipe-panel">
          <div class="recipe-toolbar">
            <label>
              Recipe
              <input id="recipePicker" type="search" list="recipeOptions" placeholder="search recipes by name, tag, field">
              <datalist id="recipeOptions"></datalist>
            </label>
            <button id="applyRecipeButton" class="secondary" type="button" disabled>Apply Recipe</button>
            <button id="archiveRecipeButton" class="danger" type="button" disabled>Archive Recipe</button>
            <button id="deleteRecipeButton" class="danger" type="button" disabled>Delete Recipe</button>
            <button id="reviewLaunchDiffButton" class="secondary" type="button" disabled>Review Launch Diff</button>
            <button id="saveRecipeButton" class="secondary" type="button" disabled>Save Full Diff</button>
            <button id="saveNewRecipeButton" class="secondary" type="button" disabled>Save New Diffs</button>
          </div>
          <div id="recipeStack" class="recipe-stack"></div>
        </div>
        <div class="scenario-options-toolbar">
          <label>
            Find
            <input id="scenarioOptionSearch" type="search" placeholder="field, group, help">
          </label>
          <div class="scenario-scope" role="radiogroup" aria-label="Scenario option scope">
            <label>
              <input type="radio" name="scenarioOptionScope" value="basic" checked>
              <span>Basic</span>
            </label>
            <label>
              <input type="radio" name="scenarioOptionScope" value="all">
              <span>All</span>
            </label>
          </div>
          <div class="scenario-reset-actions">
            <button id="resetScenarioGroupButton" class="secondary" type="button" disabled>Reset Group</button>
            <button id="resetScenarioAllButton" class="secondary" type="button" disabled>Reset All</button>
            <button id="saveScenarioButton" class="secondary" type="button" disabled>Save Scenario As</button>
            <button id="deleteScenarioButton" class="danger" type="button" disabled>Delete Saved Scenario</button>
          </div>
        </div>
        <div id="scenarioTabs" class="scenario-tabs" role="tablist" aria-label="Scenario option groups"></div>
        <div id="scenarioFields" class="scenario-fields"></div>
        <div id="scenarioDiffPanel" class="scenario-diff-panel" hidden>
          <div class="scenario-diff-header">
            <div>
              <strong id="scenarioDiffTitle">Scenario Diff</strong>
              <span id="scenarioDiffSummary"></span>
            </div>
            <div class="section-actions">
              <button id="confirmSaveRecipeButton" class="secondary" type="button" hidden>Save Recipe</button>
              <button id="closeScenarioDiffButton" class="secondary" type="button">Close</button>
            </div>
          </div>
          <div class="scenario-diff-scroll">
            <table class="scenario-diff-table">
              <thead>
                <tr>
                  <th>Field</th>
                  <th>Group</th>
                  <th>Base</th>
                  <th>Final</th>
                </tr>
              </thead>
              <tbody id="scenarioDiffBody"></tbody>
            </table>
          </div>
        </div>
      </div>
      <p id="formMessage" class="form-message" role="status"></p>
    </section>

    <section>
      <div class="section-title">
        <h2>Runs</h2>
        <div class="section-actions">
          <button id="exportButton" class="secondary" type="button" disabled>Export selected</button>
          <button id="bulkDeleteButton" class="danger" type="button" disabled>Delete selected</button>
          <button id="refreshButton" type="button">Refresh</button>
        </div>
      </div>
      <div class="run-tools">
        <label>
          Search
          <input id="runSearch" type="search" placeholder="name, scenario, id">
        </label>
        <label>
          Status
          <select id="statusFilter">
            <option value="all">All</option>
            <option value="active">Active</option>
            <option value="completed">Completed</option>
            <option value="problem">Failed / lost</option>
          </select>
        </label>
        <label>
          Scenario
          <select id="scenarioFilter">
            <option value="all">All scenarios</option>
          </select>
        </label>
        <div id="selectionStatus" class="selection-status">0 selected</div>
      </div>
      <div id="exportPanel" class="export-panel" hidden>
        <div class="export-header">
          <strong>Markdown Export</strong>
          <div class="section-actions">
            <button id="copyExportButton" class="secondary" type="button">Copy Markdown</button>
            <button id="downloadExportButton" class="secondary" type="button">Download .md</button>
            <button id="closeExportButton" class="secondary" type="button">Close</button>
          </div>
        </div>
        <textarea id="exportText" readonly spellcheck="false" wrap="off"></textarea>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th><input id="selectAllRuns" type="checkbox" aria-label="Select visible completed runs"></th>
              <th><button class="sort-button" type="button" data-sort="name">Run <span data-sort-indicator="name"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="status">Status <span data-sort-indicator="status"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="progress">Progress <span data-sort-indicator="progress"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="creatures">Live <span data-sort-indicator="creatures"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="seed">Outcome / Seed <span data-sort-indicator="seed"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="artifactSize">Artifacts <span data-sort-indicator="artifactSize"></span></button></th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="runsBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/app.js?v=20260527-map-library1"></script>
</body>
</html>
